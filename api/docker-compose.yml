version: '3.8'

services:
  barber-db:
    image: postgres:15-alpine
    container_name: barber-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: barber_db
    ports:
      - "5432:5432"
    volumes:
      - barber-db-data:/var/lib/postgresql/data

volumes:
  barber-db-data: